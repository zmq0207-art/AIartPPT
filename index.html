<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlideForge — 文档转 PPT 工具</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"
  onerror="this.onerror=null;this.src='https://unpkg.com/pptxgenjs@3.12.0/dist/pptxgen.bundle.js'"></script>
<script src="parser.js"></script>
<script src="themes.js"></script>
<script src="renderer.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0E0F11; --surf:#16181C; --surf2:#1E2128;
  --bd:rgba(255,255,255,0.08); --bdh:rgba(255,255,255,0.16);
  --tx:#E8EAF0; --mu:#7A7E8A; --di:#4A4E5A;
  --ac:#5B8DF6; --ach:#7AA3F8; --acg:rgba(91,141,246,0.18);
  --ok:#4EC994;
  --sans:'DM Sans',system-ui,sans-serif;
  --serif:'DM Serif Display',Georgia,serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);font-weight:300;min-height:100vh;}
.app{display:grid;grid-template-columns:400px 1fr;grid-template-rows:56px 1fr;grid-template-areas:"nav nav" "panel preview";height:100vh;overflow:hidden;}

/* Nav */
nav{grid-area:nav;display:flex;align-items:center;padding:0 1.5rem;border-bottom:1px solid var(--bd);gap:10px;background:var(--bg);}
.logo{font-family:var(--serif);font-size:1.2rem;}
.logo span{color:var(--ac);}
.badge{font-size:11px;padding:2px 8px;background:var(--acg);color:var(--ac);border:1px solid rgba(91,141,246,0.3);border-radius:20px;}
.nav-r{margin-left:auto;display:flex;gap:8px;}
.btn{padding:5px 12px;border-radius:6px;font-size:13px;font-family:var(--sans);cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--mu);transition:all .15s;}
.btn:hover{border-color:var(--bdh);color:var(--tx);}
.btn.p{background:var(--ac);color:#fff;border-color:transparent;font-weight:500;}
.btn.p:hover{background:var(--ach);}
.btn.p:disabled{background:var(--surf2);color:var(--di);cursor:not-allowed;}

/* Panel */
.panel{grid-area:panel;overflow-y:auto;border-right:1px solid var(--bd);padding:1.25rem;display:flex;flex-direction:column;gap:1rem;scrollbar-width:thin;}
.stitle{font-size:11px;font-weight:500;letter-spacing:.08em;color:var(--di);text-transform:uppercase;margin-bottom:8px;}
.card{background:var(--surf);border:1px solid var(--bd);border-radius:12px;padding:.875rem;}
.tabs{display:flex;gap:4px;margin-bottom:10px;}
.tab{padding:4px 10px;border-radius:5px;font-size:12px;font-family:var(--sans);cursor:pointer;border:1px solid transparent;background:transparent;color:var(--mu);}
.tab.on{background:var(--surf2);color:var(--tx);border-color:var(--bd);}
.pane{display:none;}.pane.on{display:block;}
textarea{width:100%;background:var(--surf2);border:1px solid var(--bd);border-radius:8px;padding:10px;color:var(--tx);font-family:var(--sans);font-size:13px;resize:vertical;min-height:180px;line-height:1.65;outline:none;}
textarea:focus{border-color:var(--bdh);}
textarea::placeholder{color:var(--di);}
.drop{border:1.5px dashed var(--bd);border-radius:8px;padding:2rem 1rem;text-align:center;cursor:pointer;transition:all .15s;}
.drop:hover,.drop.over{border-color:var(--ac);background:var(--acg);}
.drop em{display:block;font-size:1.8rem;opacity:.4;margin-bottom:6px;font-style:normal;}
.drop p{font-size:13px;color:var(--mu);}
.drop p strong{color:var(--ac);font-weight:400;}
.drop small{font-size:11px;color:var(--di);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.field label{display:block;font-size:11px;color:var(--di);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
select,input[type=number]{width:100%;background:var(--surf2);border:1px solid var(--bd);border-radius:5px;padding:7px 9px;color:var(--tx);font-family:var(--sans);font-size:13px;outline:none;}
select option{background:#1E2128;}
.tgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.ti{cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid transparent;transition:all .15s;}
.ti:hover{border-color:var(--bdh);}
.ti.on{border-color:var(--ac);}
.ti .sw{height:36px;display:flex;}
.ti .sw span{flex:1;}
.ti .nm{font-size:10px;color:var(--mu);text-align:center;padding:3px 2px;background:var(--surf);}
.sbox{background:var(--surf);border:1px solid var(--bd);border-radius:12px;padding:.875rem;display:none;}
.sbox.on{display:block;}
.sr{display:flex;justify-content:space-between;font-size:12px;color:var(--mu);margin-bottom:5px;}
.sv{color:var(--tx);font-weight:500;}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;}
.pb{background:var(--acg);color:var(--ac);}
.pg{background:rgba(78,201,148,.12);color:var(--ok);}
.genbtn{padding:12px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:14px;font-family:var(--sans);font-weight:500;cursor:pointer;margin-top:auto;transition:background .15s;}
.genbtn:hover{background:var(--ach);}

/* Preview */
.preview{grid-area:preview;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;align-items:stretch;gap:14px;scrollbar-width:thin;}
.empty{margin:auto;align-self:center;text-align:center;color:var(--di);}
.empty em{display:block;font-size:2.5rem;opacity:.25;margin-bottom:.75rem;font-style:normal;}
.empty p{font-size:14px;}
.scard{width:660px;flex-shrink:0;margin:0 auto;border:1px solid var(--bd);border-radius:12px;overflow:hidden;animation:fu .25s ease both;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.smeta{padding:7px 12px;background:var(--surf);border-bottom:1px solid var(--bd);font-size:11px;color:var(--di);display:flex;align-items:center;gap:7px;}

/*
  16:9 预览：
  sc-wrap: 660x371px 固定容器，clip 内容
  sc-inner: 960x540，scale(0.6875) 缩到 660x371，
  用 margin-bottom 负值消除 scale 后残留的布局空间
*/
.sc-wrap{
  display:block;
  width:660px;
  height:371px;
  overflow:hidden;
  background:#0a1628;
  flex-shrink:0;
  position:relative;
}
.sc-inner{
  display:block;
  width:960px;
  height:540px;
  transform:scale(0.6875);
  transform-origin:top left;
  font-family:'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif;
  /* scale 不影响布局，需要负 margin 消除多余空间 */
  margin-right:-300px;
  margin-bottom:-169px;
}

/* 流式输出显示区 */
.stream-box{width:660px;margin:0 auto;background:var(--surf);border:1px solid var(--bd);border-radius:12px;overflow:hidden;display:none;}
.stream-box.on{display:block;}
.stream-header{padding:8px 14px;background:var(--surf2);border-bottom:1px solid var(--bd);font-size:11px;color:var(--mu);display:flex;align-items:center;gap:8px;}
.stream-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:pulse 1s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stream-body{padding:12px 14px;display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;}
.stream-item{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border-radius:7px;background:var(--surf2);animation:fu .2s ease both;}
.stream-item .si-badge{font-size:10px;padding:1px 7px;border-radius:20px;flex-shrink:0;margin-top:1px;}
.stream-item .si-title{font-size:13px;color:var(--tx);font-weight:400;line-height:1.4;}
.stream-item .si-pts{font-size:11px;color:var(--mu);margin-top:3px;line-height:1.6;}
.stream-typing{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:11px;color:var(--di);}
.stream-typing span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--di);animation:tdot .9s infinite;}
.stream-typing span:nth-child(2){animation-delay:.2s;}
.stream-typing span:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,80%,100%{opacity:.2}40%{opacity:1}}
.prog{position:fixed;top:56px;left:0;height:2px;background:var(--ac);transition:width .3s;z-index:100;display:none;}
</style>
</head>
<body>
<div class="app">
  <nav>
    <div class="logo">Slide<span>Forge</span></div>
    <span class="badge">AI · DeepSeek</span>
    <div class="nav-r">
      <button class="btn" onclick="clearAll()">清空</button>
      <button class="btn p" id="dlBtn" disabled onclick="downloadPptx()">⬇ 下载 .pptx</button>
    </div>
  </nav>

  <aside class="panel">
    <div class="card">
      <p class="stitle">输入内容</p>
      <div class="tabs">
        <button class="tab on" onclick="stab('text',this)">粘贴文本</button>
        <button class="tab" onclick="stab('file',this)">上传文件</button>
        <button class="tab" onclick="stab('topic',this)">✦ 主题生成</button>
      </div>
      <div class="pane on" id="tab-text">
        <textarea id="rawText" placeholder="粘贴文章、报告、演讲稿…&#10;&#10;支持 Markdown、中文编号大纲、纯文本段落"></textarea>
      </div>
      <div class="pane" id="tab-file">
        <div class="drop" id="dz" ondragover="dov(event)" ondragleave="dol()" ondrop="ddr(event)" onclick="document.getElementById('fi').click()">
          <em>📄</em>
          <p><strong>点击选择</strong> 或拖拽文件</p>
          <small>支持 .txt · .md · .html</small>
        </div>
        <input type="file" id="fi" accept=".txt,.md,.html,.htm" style="display:none" onchange="rdf(event)">
      </div>
      <div class="pane" id="tab-topic">
        <input type="text" id="topicText" placeholder="输入一句话主题，例如：人工智能对教育的影响"
          style="width:100%;background:var(--surf2);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;color:var(--tx);font-family:var(--sans);font-size:13px;outline:none;margin-bottom:10px;"
          onkeydown="if(event.key==='Enter')generate()">
        <p style="font-size:11px;color:var(--di);line-height:1.6;">AI 将根据主题自动创作 PPT 内容，无需提供原始文章。</p>
      </div>
    </div>

    <div>
      <p class="stitle">生成设置</p>
      <div class="grid2">
        <div class="field"><label>最大幻灯片数</label><input type="number" id="maxS" value="12" min="5" max="20"></div>
        <div class="field"><label>每页最多要点</label><input type="number" id="maxP" value="4" min="2" max="6"></div>
      </div>
    </div>

    <div>
      <p class="stitle">主题风格</p>
      <div class="tgrid" id="tg"></div>
    </div>

    <div class="sbox" id="sb">
      <p class="stitle" style="margin-bottom:8px">解析结果</p>
      <div class="sr"><span>文档结构</span><span class="sv" id="s1">—</span></div>
      <div class="sr"><span>检测章节</span><span class="sv" id="s2">—</span></div>
      <div class="sr"><span>生成幻灯片</span><span class="sv" id="s3">—</span></div>
      <div class="sr" style="margin-bottom:0"><span>状态</span><span id="s4" class="pill pb">就绪</span></div>
    </div>

    <button class="genbtn" id="genBtn" onclick="generate()">✦ 解析并生成预览</button>
  </aside>

  <main class="preview" id="pa">
    <div class="empty" id="em"><em>🎞</em><p>在左侧输入内容<br>点击「解析并生成预览」</p></div>
    <div class="stream-box" id="streamBox">
      <div class="stream-header">
        <div class="stream-dot" id="streamDot"></div>
        <span id="streamLabel">AI 正在创作大纲…</span>
      </div>
      <div class="stream-body" id="streamBody">
        <div class="stream-typing" id="streamTyping">
          <span></span><span></span><span></span>
          <span style="margin-left:2px">AI 正在思考…</span>
        </div>
      </div>
    </div>
  </main>
</div>
<div class="prog" id="prog"></div>

<script>
let G_slides=null, G_theme='corporate';

// ── 主题初始化 ──────────────────────────────────────────
(function(){
  const g=document.getElementById('tg');
  ThemeEngine.list().forEach(t=>{
    const d=document.createElement('div');
    d.className='ti'+(t.id===G_theme?' on':'');
    d.innerHTML=`<div class="sw">${t.preview.map(c=>`<span style="background:#${c}"></span>`).join('')}</div><div class="nm">${t.name}</div>`;
    d.onclick=()=>{
      document.querySelectorAll('.ti').forEach(x=>x.classList.remove('on'));
      d.classList.add('on'); G_theme=t.id;
      if(G_slides) renderAll(G_slides, ThemeEngine.get(G_theme));
    };
    g.appendChild(d);
  });
})();

// ── 文件 ───────────────────────────────────────────────
function dov(e){e.preventDefault();document.getElementById('dz').classList.add('over');}
function dol(){document.getElementById('dz').classList.remove('over');}
function ddr(e){e.preventDefault();dol();rdfile(e.dataTransfer.files[0]);}
function rdf(e){rdfile(e.target.files[0]);}
function rdfile(f){
  if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    let t=ev.target.result;
    if(f.name.match(/\.html?$/i)){const d=document.createElement('div');d.innerHTML=t;t=d.innerText;}
    document.getElementById('rawText').value=t;
    stab('text',document.querySelectorAll('.tab')[0]);
  };
  r.readAsText(f,'utf-8');
}

// ── 当前激活 tab ────────────────────────────────────────
let G_activeTab = 'text';

// ── Tab ────────────────────────────────────────────────
function stab(n,b){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); document.getElementById('tab-'+n).classList.add('on');
  G_activeTab = n;
  const btn = document.getElementById('genBtn');
  btn.textContent = n === 'topic' ? '✦ 根据主题生成 PPT' : '✦ 解析并生成预览';
}

// ── 生成 ───────────────────────────────────────────────
async function generate(){
  const isTopicMode = G_activeTab === 'topic';
  const ms=parseInt(document.getElementById('maxS').value)||12;
  const mp=parseInt(document.getElementById('maxP').value)||4;
  const btn=document.getElementById('genBtn');
  const sb=document.getElementById('sb');

  let raw, topic;
  if (isTopicMode) {
    topic = document.getElementById('topicText').value.trim();
    if(!topic){alert('请输入 PPT 主题');return;}
  } else {
    raw=document.getElementById('rawText').value.trim();
    if(!raw){alert('请先输入内容');return;}
  }

  // 显示解析结果区，状态改为"解析中"
  sb.classList.add('on');
  document.getElementById('s4').className='pill pb';
  document.getElementById('s4').textContent='⏳ 解析中…';
  document.getElementById('s1').textContent='—';
  document.getElementById('s2').textContent='—';
  document.getElementById('s3').textContent='—';
  btn.disabled=true;
  btn.textContent='⏳ AI 生成中…';
  setprog(15);

  if (isTopicMode) {
    document.getElementById('s1').textContent = '主题创作 · AI';
    try {
      setprog(30);
      G_slides = await generateFromTopic(topic, {maxSlides: ms, maxPoints: mp});
      setprog(80);
      document.getElementById('s2').textContent=G_slides.filter(s=>s.type==='content').length+' 个';
      document.getElementById('s3').textContent=G_slides.length+' 张';
      document.getElementById('s4').className='pill pg';
      document.getElementById('s4').textContent='✓ 完成';
      renderAll(G_slides, ThemeEngine.get(G_theme));
      document.getElementById('dlBtn').disabled=false;
    } catch(e) {
      document.getElementById('streamBox').classList.remove('on');
      setStatus('⚠ 生成失败: '+e.message.slice(0,30),'#f59e0b');
    }
    btn.disabled=false;
    btn.textContent='✦ 根据主题生成 PPT';
    setprog(100); setTimeout(()=>setprog(0),600);
    return;
  }

  const st=StructureDetector.detect(TextCleaner.clean(raw));
  const sn={markdown:'Markdown',numbered:'数字编号',bullet:'Bullet列表',plain:'纯文本'};
  document.getElementById('s1').textContent=sn[st]||st;

  try {
    setprog(30);
    G_slides = await SlideParser.parseWithAI(raw,{maxSlides:ms,maxPointsPerSlide:mp});
    document.getElementById('s1').textContent=(sn[st]||st)+' · AI';
    document.getElementById('s4').className='pill pg';
    document.getElementById('s4').textContent='✓ 完成';
  } catch(e) {
    // API 报错，降级到本地规则解析并提示
    G_slides=SlideParser.parse(raw,{maxSlides:ms,maxPointsPerSlide:mp});
    document.getElementById('s1').textContent=(sn[st]||st)+' · 本地';
    setStatus('⚠ AI失败: '+e.message.slice(0,30),'#f59e0b');
  }

  setprog(80);
  document.getElementById('s2').textContent=G_slides.filter(s=>s.type==='content').length+' 个';
  document.getElementById('s3').textContent=G_slides.length+' 张';
  // 只在没有错误状态时才覆盖为"完成"（AI失败时保留黄色警告）
  if(document.getElementById('s4').textContent==='⏳ 解析中…' ||
     document.getElementById('s4').textContent==='⏳'){
    document.getElementById('s4').className='pill pg';
    document.getElementById('s4').textContent='✓ 完成';
  }
  renderAll(G_slides,ThemeEngine.get(G_theme));
  document.getElementById('dlBtn').disabled=false;
  btn.disabled=false;
  btn.textContent='✦ 解析并生成预览';
  setprog(100);setTimeout(()=>setprog(0),600);
}

function setStatus(msg, color){
  const el=document.getElementById('s4');
  el.className='pill';
  el.style.background='rgba(0,0,0,0.2)';
  el.style.color=color||'var(--mu)';
  el.textContent=msg;
}

// ── 主题生成：SSE 流式读取 /api/generate ──────────────
async function generateFromTopic(topic, opts = {}) {
  const { maxSlides = 12, maxPoints = 4 } = opts;

  const streamBox   = document.getElementById('streamBox');
  const streamBody  = document.getElementById('streamBody');
  const streamLabel = document.getElementById('streamLabel');
  const streamDot   = document.getElementById('streamDot');

  // 重置显示区
  streamBox.classList.add('on');
  streamBody.innerHTML = '<div class="stream-typing" id="streamTyping"><span></span><span></span><span></span><span style="margin-left:2px">AI 正在思考…</span></div>';
  streamLabel.textContent = 'AI 正在创作大纲…';
  streamDot.style.animation = 'pulse 1s infinite';
  streamDot.style.background = 'var(--ac)';
  document.getElementById('em').style.display = 'none';

  const resp = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ topic, maxSlides, maxPoints })
  });

  if (!resp.ok) {
    const data = await resp.json().catch(() => ({}));
    throw new Error(data.error || `请求失败 ${resp.status}`);
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buffer = '';
  let rawText = '';   // 累积所有 token 原文
  let slides = null;

  // 实时解析：每当 rawText 中发现完整的 {...} 对象就渲染一张卡片
  let lastParsedCount = 0;
  const typeLabel = { cover:'封面', agenda:'目录', content:'内容页', end:'结尾' };
  const typeBadgeStyle = {
    cover:  'background:var(--acg);color:var(--ac)',
    agenda: 'background:rgba(78,201,148,.12);color:var(--ok)',
    content:'background:rgba(255,255,255,.06);color:var(--mu)',
    end:    'background:rgba(78,201,148,.12);color:var(--ok)'
  };

  function tryRenderNewSlides() {
    // 在 rawText 里找所有完整的 {...} 对象（顶层数组元素）
    let searchFrom = 0;
    let count = 0;
    while (true) {
      const start = rawText.indexOf('{', searchFrom);
      if (start === -1) break;
      // 找匹配的右括号
      let depth = 0, inStr = false, esc = false, end = -1;
      for (let i = start; i < rawText.length; i++) {
        const ch = rawText[i];
        if (esc) { esc = false; continue; }
        if (ch === '\\' && inStr) { esc = true; continue; }
        if (ch === '"') { inStr = !inStr; continue; }
        if (inStr) continue;
        if (ch === '{') depth++;
        else if (ch === '}') { depth--; if (depth === 0) { end = i; break; } }
      }
      if (end === -1) break; // 对象不完整，等待更多 token

      count++;
      if (count > lastParsedCount) {
        // 新增一个完整对象，尝试解析并渲染
        try {
          const obj = JSON.parse(rawText.slice(start, end + 1));
          if (obj && obj.type && obj.title) {
            // 移除"思考中"占位
            const typing = document.getElementById('streamTyping');
            if (typing) typing.remove();

            const item = document.createElement('div');
            item.className = 'stream-item';
            item.style.animationDelay = (count * 40) + 'ms';
            const pts = (obj.points || []).slice(0, 3);
            item.innerHTML = `
              <span class="si-badge" style="${typeBadgeStyle[obj.type]||typeBadgeStyle.content}">${typeLabel[obj.type]||obj.type}</span>
              <div>
                <div class="si-title">${obj.title}</div>
                ${pts.length ? `<div class="si-pts">${pts.map(p=>'· '+p).join('<br>')}</div>` : ''}
              </div>`;
            streamBody.appendChild(item);
            streamBody.scrollTop = streamBody.scrollHeight;
          }
        } catch(e) { /* 解析失败跳过 */ }
        lastParsedCount = count;
      }
      searchFrom = end + 1;
    }
  }

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += dec.decode(value, { stream: true });
    const parts = buffer.split('\n\n');
    buffer = parts.pop();

    for (const part of parts) {
      for (const line of part.split('\n')) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data:')) continue;
        const payload = trimmed.slice(5).trim();
        if (!payload) continue;

        let evt;
        try { evt = JSON.parse(payload); } catch { continue; }

        if (evt.error) throw new Error(evt.error);

        if (evt.token) {
          rawText += evt.token;
          tryRenderNewSlides();
        }

        if (evt.slides) slides = evt.slides;
      }
    }
  }

  // 完成
  streamDot.style.animation = 'none';
  streamDot.style.background = 'var(--ok)';
  streamLabel.textContent = `✓ 已生成 ${slides ? slides.length : 0} 张幻灯片，正在渲染…`;

  setTimeout(() => { streamBox.classList.remove('on'); }, 2000);

  if (!slides) throw new Error('未收到有效幻灯片数据');
  return slides;
}

// ── 渲染所有幻灯片 ─────────────────────────────────────
function renderAll(sls,th){
  const pa=document.getElementById('pa');
  document.getElementById('em').style.display='none';
  pa.querySelectorAll('.scard').forEach(e=>e.remove());
  const lb={cover:'封面',agenda:'目录',content:'内容',end:'结尾'};

  sls.forEach((sl,i)=>{
    const card=document.createElement('div');
    card.className='scard';
    card.style.animationDelay=(i*35)+'ms';

    const meta=document.createElement('div');
    meta.className='smeta';
    meta.innerHTML=`<span>第${i+1}张</span><span class="pill pb">${lb[sl.type]||sl.type}</span><span style="color:var(--di)">${sl.title||''}</span>`;
    card.appendChild(meta);

    const wrap=document.createElement('div');
    wrap.className='sc-wrap';
    const inner=document.createElement('div');
    inner.className='sc-inner';
    inner.innerHTML=buildSlideHTML(sl,th);
    wrap.appendChild(inner);
    card.appendChild(wrap);
    pa.appendChild(card);
  });

  // CSS 已经固定了 scale，不需要 JS 介入
}

// ── 构建单张幻灯片 HTML（960x540 坐标系）────────────────
function buildSlideHTML(sl, th){
  const cc=th.cover, ct=th.content, ca=th.agenda, ce=th.end;

  if(sl.type==='cover'){
    const subHTML = sl.subtitle ? '<div style="margin-top:20px;font-size:20px;color:#'+cc.subtitleColor+';line-height:1.55;max-height:90px;overflow:hidden;word-break:break-all;">'+sl.subtitle+'</div>' : '';
    return '<div style="width:960px;height:540px;background:#'+cc.bg+';display:flex;flex-direction:column;justify-content:center;padding:64px 72px;box-sizing:border-box;">'
      + '<div style="width:72px;height:5px;background:#'+cc.accentColor+';border-radius:3px;margin-bottom:30px;flex-shrink:0;"></div>'
      + '<div style="font-size:40px;font-weight:700;color:#'+cc.titleColor+';line-height:1.3;max-height:160px;overflow:hidden;word-break:break-all;">'+sl.title+'</div>'
      + subHTML
      + '</div>';
  }

  if(sl.type==='end'){
    const subHTML = sl.subtitle ? '<div style="font-size:20px;color:#'+ce.subtitleColor+';max-height:80px;overflow:hidden;word-break:break-all;">'+sl.subtitle+'</div>' : '';
    return '<div style="width:960px;height:540px;background:#'+ce.bg+';display:flex;flex-direction:column;justify-content:center;padding:64px 72px;box-sizing:border-box;">'
      + '<div style="font-size:56px;font-weight:700;color:#'+ce.titleColor+';margin-bottom:22px;flex-shrink:0;">'+sl.title+'</div>'
      + subHTML
      + '</div>';
  }

  if(sl.type==='agenda'){
    const items=(sl.points||[]).slice(0,6);
    const rowH=Math.floor(400/Math.max(items.length,1));
    return `<div style="width:960px;height:540px;background:#${ca.bg};
      display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;">
      <div style="height:88px;min-height:88px;background:#${ca.headerBg};
        display:flex;align-items:center;padding:0 56px;">
        <span style="font-size:30px;font-weight:700;color:#${ca.titleColor};">${sl.title}</span>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;
        padding:14px 56px;gap:8px;overflow:hidden;">
        ${items.map((pt,i)=>`
          <div style="display:flex;align-items:center;gap:16px;height:${rowH}px;min-height:0;overflow:hidden;">
            <div style="width:32px;height:32px;min-width:32px;background:#${ca.itemBorder};border-radius:5px;
              display:flex;align-items:center;justify-content:center;
              color:#fff;font-size:16px;font-weight:700;flex-shrink:0;">${i+1}</div>
            <span style="font-size:20px;color:#${ca.itemText};
              overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${pt}</span>
          </div>`).join('')}
      </div>
    </div>`;
  }

  // content
  const pts=sl.points||[];
  const rowH=Math.floor(400/Math.max(pts.length,1));
  const mkBullet=()=>{
    if(ct.bulletShape==='circle') return `<div style="width:14px;height:14px;min-width:14px;background:#${ct.bulletColor};border-radius:50%;flex-shrink:0;"></div>`;
    if(ct.bulletShape==='line')   return `<div style="width:4px;height:22px;min-width:4px;background:#${ct.bulletColor};border-radius:2px;flex-shrink:0;"></div>`;
    return `<div style="width:14px;height:14px;min-width:14px;background:#${ct.bulletColor};border-radius:3px;flex-shrink:0;"></div>`;
  };
  return `<div style="width:960px;height:540px;background:#${ct.bg};
    display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;">
    <div style="height:88px;min-height:88px;background:#${ct.headerBg};
      display:flex;align-items:center;padding:0 56px;">
      <span style="font-size:30px;font-weight:700;color:#${ct.titleColor};
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:848px;">${sl.title}</span>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;
      padding:14px 56px;gap:8px;overflow:hidden;">
      ${pts.map(pt=>`
        <div style="display:flex;align-items:center;gap:16px;height:${rowH}px;min-height:0;overflow:hidden;">
          ${mkBullet()}
          <span style="font-size:20px;color:#${ct.pointColor};
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${pt}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

// ── 下载 ───────────────────────────────────────────────
async function downloadPptx(){
  if(!G_slides)return;
  setprog(30);
  try{
    await PptxRenderer.render(G_slides,ThemeEngine.get(G_theme),G_slides[0]?.title||'演示文稿');
    setprog(100);setTimeout(()=>setprog(0),600);
  }catch(e){alert('生成失败：'+e.message);setprog(0);}
}

// ── 清空 ───────────────────────────────────────────────
function clearAll(){
  document.getElementById('rawText').value='';
  document.getElementById('topicText').value='';
  G_slides=null;
  document.getElementById('dlBtn').disabled=true;
  document.getElementById('sb').classList.remove('on');
  document.getElementById('em').style.display='';
  document.getElementById('pa').querySelectorAll('.scard').forEach(e=>e.remove());
  const sb2=document.getElementById('streamBox');
  if(sb2){sb2.classList.remove('on');document.getElementById('streamBody').innerHTML='';}
}

// ── 进度条 ─────────────────────────────────────────────
function setprog(n){
  const b=document.getElementById('prog');
  b.style.display=n>0?'block':'none';
  b.style.width=n+'%';
}
