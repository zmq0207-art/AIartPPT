<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlideForge — 文档转 PPT 工具</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"
  onerror="this.onerror=null;this.src='https://unpkg.com/pptxgenjs@3.12.0/dist/pptxgen.bundle.js'"></script>
<script src="parser.js"></script>
<script src="themes.js"></script>
<script src="renderer.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0E0F11; --surface: #16181C; --surface2: #1E2128;
  --border: rgba(255,255,255,0.08); --border-h: rgba(255,255,255,0.16);
  --text: #E8EAF0; --muted: #7A7E8A; --dim: #4A4E5A;
  --accent: #5B8DF6; --accent-h: #7AA3F8; --accent-g: rgba(91,141,246,0.18);
  --ok: #4EC994;
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px;
  --sans: 'DM Sans', system-ui, sans-serif;
  --serif: 'DM Serif Display', Georgia, serif;
}
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-weight:300; min-height:100vh; }

/* Layout */
.app { display:grid; grid-template-columns:420px 1fr; grid-template-rows:60px 1fr; grid-template-areas:"nav nav" "panel preview"; height:100vh; overflow:hidden; }

/* Nav */
nav { grid-area:nav; display:flex; align-items:center; padding:0 2rem; border-bottom:1px solid var(--border); gap:12px; background:var(--bg); z-index:10; }
.logo { font-family:var(--serif); font-size:1.25rem; }
.logo span { color:var(--accent); }
.badge { font-size:11px; padding:2px 8px; background:var(--accent-g); color:var(--accent); border:1px solid rgba(91,141,246,0.3); border-radius:20px; }
.nav-r { margin-left:auto; display:flex; gap:8px; }
.btn { padding:6px 14px; border-radius:var(--r-sm); font-size:13px; font-family:var(--sans); cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all .15s; }
.btn:hover { border-color:var(--border-h); color:var(--text); }
.btn.p { background:var(--accent); color:#fff; border-color:transparent; font-weight:500; }
.btn.p:hover { background:var(--accent-h); }
.btn.p:disabled { background:var(--surface2); color:var(--dim); cursor:not-allowed; }

/* Panel */
.panel { grid-area:panel; overflow-y:auto; border-right:1px solid var(--border); padding:1.5rem; display:flex; flex-direction:column; gap:1.25rem; scrollbar-width:thin; }
.sec-title { font-size:11px; font-weight:500; letter-spacing:.08em; color:var(--dim); text-transform:uppercase; margin-bottom:10px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:1rem; }

/* Tabs */
.tabs { display:flex; gap:4px; margin-bottom:12px; }
.tab { padding:5px 12px; border-radius:var(--r-sm); font-size:12px; font-family:var(--sans); cursor:pointer; border:1px solid transparent; background:transparent; color:var(--muted); transition:all .15s; }
.tab.on { background:var(--surface2); color:var(--text); border-color:var(--border); }
.pane { display:none; }
.pane.on { display:block; }

textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-md); padding:12px; color:var(--text); font-family:var(--sans); font-size:13px; resize:vertical; min-height:200px; line-height:1.7; outline:none; }
textarea:focus { border-color:var(--border-h); }
textarea::placeholder { color:var(--dim); }

.drop { border:1.5px dashed var(--border); border-radius:var(--r-md); padding:2.5rem 1rem; text-align:center; cursor:pointer; transition:all .15s; }
.drop:hover,.drop.over { border-color:var(--accent); background:var(--accent-g); }
.drop-icon { font-size:2rem; opacity:.4; margin-bottom:8px; }
.drop-text { font-size:13px; color:var(--muted); }
.drop-text strong { color:var(--accent); font-weight:400; }
.drop-hint { font-size:11px; color:var(--dim); margin-top:4px; }

/* Settings */
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.field label { display:block; font-size:11px; color:var(--dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
select, input[type=number] { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 10px; color:var(--text); font-family:var(--sans); font-size:13px; outline:none; }
select option { background:#1E2128; }

/* Theme */
.theme-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.ti { cursor:pointer; border-radius:var(--r-md); overflow:hidden; border:2px solid transparent; transition:all .15s; }
.ti:hover { border-color:var(--border-h); transform:translateY(-1px); }
.ti.on { border-color:var(--accent); }
.ti-sw { height:40px; display:flex; }
.ti-sw span { flex:1; }
.ti-name { font-size:10px; color:var(--muted); text-align:center; padding:4px 2px; background:var(--surface); }

/* Status */
.status-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:1rem; display:none; }
.status-box.on { display:block; }
.srow { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:6px; }
.sval { color:var(--text); font-weight:500; }
.pill { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; }
.pill-b { background:var(--accent-g); color:var(--accent); }
.pill-g { background:rgba(78,201,148,.12); color:var(--ok); }

/* Preview */
.preview { grid-area:preview; overflow-y:auto; padding:2rem; display:flex; flex-direction:column; align-items:center; gap:16px; scrollbar-width:thin; }
.empty { margin:auto; text-align:center; color:var(--dim); }
.empty .ico { font-size:3rem; opacity:.25; display:block; margin-bottom:1rem; }
.empty p { font-size:14px; }

/* Slide card */
.scard { width:100%; max-width:680px; border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden; animation:fu .3s ease both; }
.scard:hover { border-color:var(--border-h); }
@keyframes fu { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.smeta { padding:8px 14px; background:var(--surface); border-bottom:1px solid var(--border); font-size:11px; color:var(--dim); display:flex; align-items:center; gap:8px; }

/*
  핵심: slide-canvas 는 width:100% 고정, height는 JS로 설정
  slide-inner는 항상 960x540, transform으로 축소
*/
.sc {
  width: 100%;
  position: relative;
  overflow: hidden;
  background: #111;
  font-family: 'Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif;
}
.si {
  position: absolute;
  top: 0; left: 0;
  width: 960px;
  height: 540px;
  transform-origin: top left;
}

/* Progress */
.prog { position:fixed; top:60px; left:0; height:2px; background:var(--accent); transition:width .3s; z-index:100; display:none; }
</style>
</head>
<body>
<div class="app">
  <nav>
    <div class="logo">Slide<span>Forge</span></div>
    <span class="badge">无 AI API · 自研引擎</span>
    <div class="nav-r">
      <button class="btn" onclick="clearAll()">清空</button>
      <button class="btn p" id="dlBtn" disabled onclick="downloadPptx()">⬇ 下载 .pptx</button>
    </div>
  </nav>

  <aside class="panel">
    <div class="card">
      <p class="sec-title">输入内容</p>
      <div class="tabs">
        <button class="tab on" onclick="switchTab('text',this)">粘贴文本</button>
        <button class="tab" onclick="switchTab('file',this)">上传文件</button>
      </div>
      <div class="pane on" id="tab-text">
        <textarea id="rawText" placeholder="粘贴文章、报告、演讲稿…&#10;&#10;支持 Markdown、中文编号大纲、纯文本段落"></textarea>
      </div>
      <div class="pane" id="tab-file">
        <div class="drop" id="dropzone"
          ondragover="ev(event,'over')" ondragleave="ev(event,'')" ondrop="drop(event)"
          onclick="document.getElementById('fi').click()">
          <div class="drop-icon">📄</div>
          <div class="drop-text"><strong>点击选择</strong> 或拖拽文件</div>
          <div class="drop-hint">支持 .txt · .md · .html</div>
        </div>
        <input type="file" id="fi" accept=".txt,.md,.html,.htm" style="display:none" onchange="readF(event)">
      </div>
    </div>

    <div>
      <p class="sec-title">生成设置</p>
      <div class="grid2">
        <div class="field"><label>最大幻灯片数</label><input type="number" id="maxS" value="12" min="5" max="20"></div>
        <div class="field"><label>每页最多要点</label><input type="number" id="maxP" value="4" min="2" max="6"></div>
      </div>
    </div>

    <div>
      <p class="sec-title">主题风格</p>
      <div class="theme-grid" id="tg"></div>
    </div>

    <div class="status-box" id="sb">
      <p class="sec-title" style="margin-bottom:10px">解析结果</p>
      <div class="srow"><span>文档结构</span><span class="sval" id="s1">—</span></div>
      <div class="srow"><span>检测章节</span><span class="sval" id="s2">—</span></div>
      <div class="srow"><span>生成幻灯片</span><span class="sval" id="s3">—</span></div>
      <div class="srow" style="margin-bottom:0"><span>状态</span><span id="s4" class="pill pill-b">就绪</span></div>
    </div>

    <button style="padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-md);font-size:15px;font-family:var(--sans);font-weight:500;cursor:pointer;margin-top:auto;"
      onclick="generate()">✦ 解析并生成预览</button>
  </aside>

  <main class="preview" id="pa">
    <div class="empty" id="em">
      <span class="ico">🎞</span>
      <p>在左侧输入内容，点击「解析并生成预览」</p>
    </div>
  </main>
</div>
<div class="prog" id="prog"></div>

<script>
let slides = null, theme = 'corporate';

// 主题初始化
(function(){
  const g = document.getElementById('tg');
  ThemeEngine.list().forEach(t => {
    const d = document.createElement('div');
    d.className = 'ti' + (t.id===theme?' on':'');
    d.innerHTML = `<div class="ti-sw">${t.preview.map(c=>`<span style="background:#${c}"></span>`).join('')}</div><div class="ti-name">${t.name}</div>`;
    d.onclick = () => {
      document.querySelectorAll('.ti').forEach(x=>x.classList.remove('on'));
      d.classList.add('on'); theme = t.id;
      if (slides) renderAll(slides, ThemeEngine.get(theme));
    };
    g.appendChild(d);
  });
})();

function switchTab(n,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('tab-'+n).classList.add('on');
}

function ev(e,cls){ e.preventDefault(); document.getElementById('dropzone').className='drop'+( cls?' '+cls:''); }
function drop(e){ e.preventDefault(); document.getElementById('dropzone').className='drop'; readFile(e.dataTransfer.files[0]); }
function readF(e){ readFile(e.target.files[0]); }
function readFile(f){
  if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    let t=ev.target.result;
    if(f.name.match(/\.html?$/i)){ const d=document.createElement('div'); d.innerHTML=t; t=d.innerText; }
    document.getElementById('rawText').value=t;
    switchTab('text',document.querySelectorAll('.tab')[0]);
  };
  r.readAsText(f,'utf-8');
}

function generate(){
  const raw = document.getElementById('rawText').value.trim();
  if(!raw){ alert('请先输入内容'); return; }
  prog(20);
  const ms=parseInt(document.getElementById('maxS').value)||12;
  const mp=parseInt(document.getElementById('maxP').value)||4;
  slides = SlideParser.parse(raw,{maxSlides:ms,maxPointsPerSlide:mp});
  prog(60);
  const st = StructureDetector.detect(TextCleaner.clean(raw));
  const sn = {markdown:'Markdown',numbered:'数字编号',bullet:'Bullet列表',plain:'纯文本'};
  document.getElementById('s1').textContent = sn[st]||st;
  document.getElementById('s2').textContent = slides.filter(s=>s.type==='content').length+' 个';
  document.getElementById('s3').textContent = slides.length+' 张';
  document.getElementById('s4').className='pill pill-g';
  document.getElementById('s4').textContent='✓ 完成';
  document.getElementById('sb').classList.add('on');
  renderAll(slides, ThemeEngine.get(theme));
  document.getElementById('dlBtn').disabled=false;
  prog(100); setTimeout(()=>prog(0),600);
}

function renderAll(sls, th){
  const pa = document.getElementById('pa');
  document.getElementById('em').style.display='none';
  pa.querySelectorAll('.scard').forEach(e=>e.remove());
  const labels = {cover:'封面',agenda:'目录',content:'内容',end:'结尾'};
  sls.forEach((sl,i)=>{
    const card = document.createElement('div');
    card.className='scard';
    card.style.animationDelay=(i*40)+'ms';
    card.innerHTML=`<div class="smeta"><span>第${i+1}张</span><span class="pill pill-b">${labels[sl.type]||sl.type}</span><span style="color:var(--dim)">${sl.title||''}</span></div><div class="sc" id="sc${i}"></div>`;
    pa.appendChild(card);
    drawSlide(document.getElementById('sc'+i), sl, th);
  });
}

function drawSlide(el, sl, th){
  // 获取容器实际宽度，设置高度，计算 scale
  const W = el.getBoundingClientRect().width || el.offsetWidth || 680;
  const H = Math.round(W * 9 / 16);
  el.style.height = H + 'px';
  const scale = W / 960;

  const cc=th.cover, ct=th.content, ca=th.agenda, ce=th.end;

  let html = '';
  if(sl.type==='cover'){
    html=`<div style="width:960px;height:540px;background:#${cc.bg};display:flex;flex-direction:column;justify-content:center;padding:60px 72px;box-sizing:border-box;">
      <div style="width:72px;height:5px;background:#${cc.accentColor};border-radius:3px;margin-bottom:28px;"></div>
      <div style="font-size:38px;font-weight:700;color:#${cc.titleColor};line-height:1.3;word-break:break-all;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;">${sl.title}</div>
      ${sl.subtitle?`<div style="margin-top:18px;font-size:19px;color:#${cc.subtitleColor};line-height:1.55;word-break:break-all;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${sl.subtitle}</div>`:''}
    </div>`;
  } else if(sl.type==='end'){
    html=`<div style="width:960px;height:540px;background:#${ce.bg};display:flex;flex-direction:column;justify-content:center;padding:60px 72px;box-sizing:border-box;">
      <div style="font-size:52px;font-weight:700;color:#${ce.titleColor};margin-bottom:20px;">${sl.title}</div>
      ${sl.subtitle?`<div style="font-size:19px;color:#${ce.subtitleColor};word-break:break-all;">${sl.subtitle}</div>`:''}
    </div>`;
  } else if(sl.type==='agenda'){
    const items=(sl.points||[]).slice(0,6);
    const ih=Math.floor(400/Math.max(items.length,1));
    html=`<div style="width:960px;height:540px;background:#${ca.bg};display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;">
      <div style="height:82px;min-height:82px;background:#${ca.headerBg};display:flex;align-items:center;padding:0 52px;">
        <span style="font-size:28px;font-weight:700;color:#${ca.titleColor};">${sl.title}</span>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:12px 52px;gap:6px;overflow:hidden;">
        ${items.map((pt,i)=>`<div style="display:flex;align-items:center;gap:14px;height:${ih}px;min-height:0;">
          <div style="width:30px;height:30px;min-width:30px;background:#${ca.itemBorder};border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;">${i+1}</div>
          <span style="font-size:19px;color:#${ca.itemText};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${pt}</span>
        </div>`).join('')}
      </div>
    </div>`;
  } else {
    const pts=sl.points||[];
    const ih=Math.floor(400/Math.max(pts.length,1));
    const bullets=pts.map(pt=>{
      let b='';
      if(ct.bulletShape==='circle') b=`<div style="width:13px;height:13px;min-width:13px;background:#${ct.bulletColor};border-radius:50%;flex-shrink:0;"></div>`;
      else if(ct.bulletShape==='line') b=`<div style="width:4px;height:20px;min-width:4px;background:#${ct.bulletColor};border-radius:2px;flex-shrink:0;"></div>`;
      else b=`<div style="width:13px;height:13px;min-width:13px;background:#${ct.bulletColor};border-radius:3px;flex-shrink:0;"></div>`;
      return `<div style="display:flex;align-items:center;gap:14px;height:${ih}px;min-height:0;overflow:hidden;">
        ${b}<span style="font-size:19px;color:#${ct.pointColor};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;">${pt}</span>
      </div>`;
    }).join('');
    html=`<div style="width:960px;height:540px;background:#${ct.bg};display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;">
      <div style="height:82px;min-height:82px;background:#${ct.headerBg};display:flex;align-items:center;padding:0 52px;">
        <span style="font-size:28px;font-weight:700;color:#${ct.titleColor};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:860px;">${sl.title}</span>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:12px 52px;gap:6px;overflow:hidden;">${bullets}</div>
    </div>`;
  }

  // 写入 960x540 内部画布，用 scale 缩小
  el.innerHTML = `<div class="si" style="transform:scale(${scale});">${html}</div>`;
}

async function downloadPptx(){
  if(!slides) return;
  prog(30);
  const th=ThemeEngine.get(theme);
  const title=slides[0]?.title||'演示文稿';
  try{ await PptxRenderer.render(slides,th,title); prog(100); setTimeout(()=>prog(0),600); }
  catch(e){ alert('生成失败：'+e.message); prog(0); }
}

function clearAll(){
  document.getElementById('rawText').value='';
  slides=null;
  document.getElementById('dlBtn').disabled=true;
  document.getElementById('sb').classList.remove('on');
  document.getElementById('em').style.display='';
  document.querySelectorAll('.scard').forEach(e=>e.remove());
}

function prog(n){
  const b=document.getElementById('prog');
  b.style.display=n>0?'block':'none';
  b.style.width=n+'%';
}
</script>
</body>
</html>
